name: opennutritracker
description: Open-Source Calories & Activity Tracker

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.3.1+49

environment:
  sdk: '>=3.11.0 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter


  collection: ^1.19.1
  intl: ^0.20.2
  get_it: ^9.2.1
  provider: ^6.1.5+1
  http: ^1.6.0
  uuid: ^4.5.3
  json_annotation: ^4.11.0
  logging: ^1.3.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^10.0.0
  cupertino_icons: ^1.0.9
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  flutter_svg: ^2.2.4
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  envied: ^1.3.4
  archive: 4.0.9
  file_picker: ^11.0.2

  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  percent_indicator: ^4.2.5
  horizontal_picker: ^1.2.0
  table_calendar: ^3.2.0
  introduction_screen: ^4.0.0
  auto_size_text: ^3.0.0
  animated_flip_counter: ^0.3.4
  fl_chart: ^1.2.0

  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  share_plus: ^10.0.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0

  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

  sentry_flutter: ^9.19.0

  supabase_flutter: ^2.12.4
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  flutter_timezone: ^3.0.0

  dynamic_color: ^1.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  build_runner: ^2.15.0
  json_serializable: ^6.13.2
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  hive_ce_generator: ^1.11.1
  envied_generator: ^1.3.4
  mockito: ^5.6.4
  # Transitively required by image_picker; declared explicitly so tests
  # can stub PathProviderPlatform.instance for filesystem round-trips.
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

flutter:

  uses-material-design: true

  assets:
    - assets/icon/ont_logo_square.png
    - assets/icon/ont_logo_square.svg
    - assets/icon/ont_logo_square_light.png
    - assets/icon/ont_banner_top.png
    - assets/icon/ont_banner_top_light.png
    - assets/icon/nonbinary_symbol.svg

  fonts:
    - family: CustomIcons
      fonts:
      - asset: fonts/CustomIcons.ttf
    - family: Poppins
      fonts:
      - asset: fonts/Poppins-Black.ttf
      - asset: fonts/Poppins-BlackItalic.ttf
        style: italic
      - asset: fonts/Poppins-Bold.ttf
      - asset: fonts/Poppins-BoldItalic.ttf
        style: italic
      - asset: fonts/Poppins-ExtraBold.ttf
      - asset: fonts/Poppins-ExtraBoldItalic.ttf
        style: italic
      - asset: fonts/Poppins-ExtraLight.ttf
      - asset: fonts/Poppins-ExtraLightItalic.ttf
        style: italic
      - asset: fonts/Poppins-Italic.ttf
        style: italic
      - asset: fonts/Poppins-Light.ttf
      - asset: fonts/Poppins-LightItalic.ttf
        style: italic
      - asset: fonts/Poppins-Medium.ttf
      - asset: fonts/Poppins-MediumItalic.ttf
        style: italic
      - asset: fonts/Poppins-Regular.ttf
      - asset: fonts/Poppins-SemiBold.ttf
      - asset: fonts/Poppins-SemiBoldItalic.ttf
        style: italic
      - asset: fonts/Poppins-Thin.ttf
      - asset: fonts/Poppins-ThinItalic.ttf
        style: italic

flutter_intl:
  enabled: true

flutter_launcher_icons:
  android: true
  adaptive_icon_foreground: "assets/icon/ont_logo_square.png"
  adaptive_icon_background: "#ffffff"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/ont_logo_square.png"
  min_sdk_android: 21
