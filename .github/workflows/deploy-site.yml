# Deploy the project landing page (docs/site/) to GitHub Pages.
#
# Fires automatically on pushes to `main` that change the site, and can also
# be started manually from the Actions tab.
#
# Pages source in repo settings must be set to "GitHub Actions" (not
# "Deploy from a branch") for this workflow to take effect.

name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment can be in flight at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
