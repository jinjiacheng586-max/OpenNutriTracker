  ios-deploy:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
#    needs:
#      - linux-checks
#      - ios-build
#      - ios-integration-tests
#      - android-build
#      - android-integration-tests
    runs-on: macos-26
    permissions:
      contents: read
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      BUNDLE_GEMFILE: ${{ github.workspace }}/ios/Gemfile
      FDC_API_KEY: ${{ secrets.FDC_API_KEY }}
      SENTRY_DNS: ${{ secrets.SENTRY_DNS }}
      SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
      SUPABASE_PROJECT_ANON_KEY: ${{ secrets.SUPABASE_PROJECT_ANON_KEY }}
      MATCH_READONLY: 'true'
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL != '' && secrets.MATCH_GIT_URL }}
      MATCH_GIT_SSH_PRIVATE_KEY: ${{ secrets.MATCH_GIT_SSH_PRIVATE_KEY }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
      APP_STORE_CONNECT_API_KEY_IS_KEY_CONTENT_BASE64: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

#      # App Store Connect now requires builds created with the iOS 26 SDK.
#      - name: Setup Xcode 26
#        uses: maxim-lobanov/setup-xcode@v1
#        with:
#          xcode-version: '26.0'
#
#      - name: Verify Xcode and iOS SDK
#        run: |
#          xcodebuild -version
#          xcodebuild -showsdks
#          xcodebuild -version | grep -q '^Xcode 26\.'
#          xcodebuild -showsdks | grep -q 'iphoneos26'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Setup Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Load SSH key for match repository
        if: startsWith(env.MATCH_GIT_URL, 'git@') && env.MATCH_GIT_SSH_PRIVATE_KEY != ''
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_SSH_PRIVATE_KEY }}

      - name: Trust GitHub SSH host key
        if: startsWith(env.MATCH_GIT_URL, 'git@') && env.MATCH_GIT_SSH_PRIVATE_KEY != ''
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Cache Flutter packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install FVM
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install Flutter version for FVM
        run: fvm install 3.41.7

      - name: Generate .env from GitHub Secrets
        run: |
          : "${FDC_API_KEY:?Missing FDC_API_KEY secret}"
          : "${SENTRY_DNS:?Missing SENTRY_DNS secret}"
          : "${SUPABASE_PROJECT_URL:?Missing SUPABASE_PROJECT_URL secret}"
          : "${SUPABASE_PROJECT_ANON_KEY:?Missing SUPABASE_PROJECT_ANON_KEY secret}"
          cat > .env <<EOF
          FDC_API_KEY="$FDC_API_KEY"
          SENTRY_DNS="$SENTRY_DNS"
          SUPABASE_PROJECT_URL="$SUPABASE_PROJECT_URL"
          SUPABASE_PROJECT_ANON_KEY="$SUPABASE_PROJECT_ANON_KEY"
          EOF

      - name: Install Flutter packages
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: bundle exec pod install

      - name: Deploy iOS build to TestFlight via Fastlane
        working-directory: ios
        run: bundle exec fastlane ios beta

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

  android-deploy:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/android/Gemfile
      FDC_API_KEY: ${{ secrets.FDC_API_KEY }}
      SENTRY_DNS: ${{ secrets.SENTRY_DNS }}
      SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
      SUPABASE_PROJECT_ANON_KEY: ${{ secrets.SUPABASE_PROJECT_ANON_KEY }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Setup Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Cache Flutter packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate .env from GitHub Secrets
        run: |
          : "${FDC_API_KEY:?Missing FDC_API_KEY secret}"
          : "${SENTRY_DNS:?Missing SENTRY_DNS secret}"
          : "${SUPABASE_PROJECT_URL:?Missing SUPABASE_PROJECT_URL secret}"
          : "${SUPABASE_PROJECT_ANON_KEY:?Missing SUPABASE_PROJECT_ANON_KEY secret}"
          cat > .env <<EOF
          FDC_API_KEY="$FDC_API_KEY"
          SENTRY_DNS="$SENTRY_DNS"
          SUPABASE_PROJECT_URL="$SUPABASE_PROJECT_URL"
          SUPABASE_PROJECT_ANON_KEY="$SUPABASE_PROJECT_ANON_KEY"
          EOF

      - name: Restore Android signing material
        run: |
          : "${ANDROID_KEYSTORE_BASE64:?Missing ANDROID_KEYSTORE_BASE64 secret}"
          : "${ANDROID_KEYSTORE_PASSWORD:?Missing ANDROID_KEYSTORE_PASSWORD secret}"
          : "${ANDROID_KEY_ALIAS:?Missing ANDROID_KEY_ALIAS secret}"
          : "${ANDROID_KEY_PASSWORD:?Missing ANDROID_KEY_PASSWORD secret}"
          mkdir -p android/app
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../app/upload-keystore.jks
          EOF

      - name: Install Flutter packages
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload Android App Bundle to Google Play Internal Testing via Fastlane
        working-directory: android
        run: bundle exec fastlane android internal
        env:
          ANDROID_AAB_PATH: ${{ github.workspace }}/build/app/outputs/bundle/release/app-release.aab

  github-release:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    needs:
      - ios-deploy
      - android-deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download iOS IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: release-assets/ios

      - name: Download Android AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: release-assets/android

      - name: Download Android APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets/android

      - name: Prepare release tag and asset names
        run: |
          APP_VERSION=$(awk '/^version:/ {print $2}' pubspec.yaml)
          TAG_NAME="v${APP_VERSION}-build.${GITHUB_RUN_NUMBER}"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

          IPA_PATH=$(ls -1 release-assets/ios/*.ipa | head -n 1)
          cp "$IPA_PATH" release-assets/opennutritracker.ipa

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          generate_release_notes: true
          files: |
            release-assets/opennutritracker.ipa
            release-assets/android/app-release.aab
            release-assets/android/app-release.apk

