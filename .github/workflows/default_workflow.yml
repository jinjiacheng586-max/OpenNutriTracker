name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter and package cache
        uses: ./.github/actions/setup-flutter-cache

      - name: Setup Just
        uses: taiki-e/install-action@just

      - name: Generate stub environment
        uses: ./.github/actions/write-env-file
        with:
          fdc_api_key: ci-stub
          supabase_project_url: https://stub.supabase.co
          supabase_project_anon_key: ci-stub

      - name: Install packages
        run: just install

      - name: Verify generated localizations
        run: just check_intl

      - name: Generate code
        run: just build

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: just test

      - name: Test CocoaPods fallback parser
        run: .github/scripts/test_pod_install_with_targeted_fallback.sh

  ios-build:
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter and package cache
        uses: ./.github/actions/setup-flutter-cache

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Generate stub environment
        uses: ./.github/actions/write-env-file
        with:
          fdc_api_key: ci-stub
          supabase_project_url: https://stub.supabase.co
          supabase_project_anon_key: ci-stub

      - name: Install packages
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods dependencies
        run: .github/scripts/pod_install_with_targeted_fallback.sh

      - name: Build iOS without code signing
        run: flutter build ios --no-codesign --release --flavor full

  ios-integration-tests:
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter and package cache
        uses: ./.github/actions/setup-flutter-cache

      - name: Generate stub environment
        uses: ./.github/actions/write-env-file
        with:
          fdc_api_key: ci-stub
          supabase_project_url: https://stub.supabase.co
          supabase_project_anon_key: ci-stub

      - name: Install packages and generate code
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods dependencies
        run: .github/scripts/pod_install_with_targeted_fallback.sh

      - name: Boot an iPhone simulator
        run: |
          DEVICE_UDID=$(xcrun simctl list devices available iPhone -j | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          devices = [d for runtime in data['devices'].values() for d in runtime if d.get('isAvailable')]
          if not devices:
              sys.exit('No available iPhone simulators on this runner')
          print(devices[0]['udid'])
          ")
          xcrun simctl boot "$DEVICE_UDID"
          xcrun simctl bootstatus "$DEVICE_UDID"
          echo "DEVICE_UDID=$DEVICE_UDID" >> "$GITHUB_ENV"

      - name: Run integration tests
        run: flutter test integration_test/ -d "$DEVICE_UDID" --flavor full --reporter expanded
